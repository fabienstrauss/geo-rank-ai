version: '3.8'

services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: georank
      POSTGRES_PASSWORD: georank
      POSTGRES_DB: georank_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georank -d georank_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+psycopg2://georank:georank@db:5432/georank_db
      - APP_ENCRYPTION_KEY=5mD5Ne8kTuKxvQ8mqA2x4zvJ9P4Qx0A2K4JYd2xM8Fg=
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
